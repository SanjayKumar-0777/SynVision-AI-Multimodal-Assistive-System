<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language AI | Collect Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="status-dot"></span> SignAI
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/collect" class="nav-link active">Collect Data</a>
            <a href="/train_page" class="nav-link">Train Model</a>
            <a href="/recognize" class="nav-link">Recognize</a>
        
            <button id="mic-btn" onclick="startVoiceCommand()" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; cursor: pointer; padding: 0.5rem 1rem; margin-left: 10px; font-size: 1rem; transition: background 0.2s;" title="Voice Command">
                🎤 Voice Nav
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="grid-2">
<!-- Video Feed -->
<div class="card">
    <h2>Camera Feed</h2>
    <div class="video-container">
        <img id="videoFeed"
             width="640"
             height="480"
             style="background:black; border-radius:10px;">
    </div>
    <div style="margin-top: 1rem; text-align: center;">
        <span class="status active"><span class="status-dot"></span> Camera Active</span>
    </div>
</div>

            <!-- Controls -->
            <div class="card">
                <h2>Data Collection</h2>
                <p style="color: #94a3b8; margin-bottom: 2rem;">
                    Enter a label and capture images. Move your hands and face slightly for better variety.
                </p>

                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1;">Sign Label</label>
                    <input type="text" id="label" placeholder="e.g. Hello, Thank You..." autofocus>
                </div>

                <button id="captureBtn" onclick="startAutoCapture()" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">
                    Capture 100 Samples
                </button>

                <div class="stat-card" style="margin-top: 2rem;">
                    <div class="stat-value" id="count">0</div>
                    <div class="stat-label">Samples Collected</div>
                </div>
            </div>
        </div>
    </div>

<script>
let captureBusy = false;
let stopCapture = false;

async function startAutoCapture() {
    if (captureBusy) return;

    var label = document.getElementById('label').value;
    if (!label) {
        alert("Enter label first");
        return;
    }

    captureBusy = true;
    stopCapture = false;

    let btn = document.getElementById('captureBtn');
    btn.innerText = "Capturing... (Click to Stop)";
    btn.onclick = stopAutoCapture;
    btn.style.backgroundColor = "#e11d48"; // Danger red

    let targetSamples = 100;

    for (let i = 0; i < targetSamples; i++) {
        if (stopCapture) break;

        try {
            const res = await fetch('/save_image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'label=' + encodeURIComponent(label)
            });
            const data = await res.json();
            
            if (res.ok && data.status === 'check') {
                document.getElementById('count').innerText = data.count;
            }
        } catch (e) {
            console.error("Capture frame skipped", e);
        }
        
        // Wait 100ms between frames to capture a nice 10-second diverse stream
        await new Promise(r => setTimeout(r, 100));
    }

    // Reset UI
    btn.innerText = "Capture 100 Samples";
    btn.onclick = startAutoCapture;
    btn.style.backgroundColor = ""; 
    captureBusy = false;
}

function stopAutoCapture() {
    stopCapture = true;
}

// Live update counter when typing label
document.getElementById('label').addEventListener('input', function() {
    let lbl = this.value.trim();
    if (lbl) {
        fetch('/get_count?label=' + encodeURIComponent(lbl))
        .then(res => res.json())
        .then(data => {
            if (!captureBusy) {
                document.getElementById('count').innerText = data.count;
            }
        }).catch(err => console.error(err));
    } else {
        if (!captureBusy) {
            document.getElementById('count').innerText = "0";
        }
    }
});
</script>
    <script>
        window.onload = function() {
            fetch('/start_camera')
            .then(() => {
                document.getElementById("videoFeed").src = "/video_feed";
            });
        };
    </script>
    <script>
        window.onbeforeunload = function () {
        navigator.sendBeacon('/stop_camera');};
    </script>

    <script>
        setInterval(() => {
            fetch('/ping').catch(() => {});
        }, 2000);
    </script>

<script>
    function startVoiceCommand() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support Voice Recognition.");
            return;
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        let micBtn = document.getElementById('mic-btn');
        let originalText = micBtn.innerHTML;
        micBtn.innerHTML = "🔴 Listening...";
        micBtn.style.background = "#e11d48";

        recognition.start();

                recognition.onresult = function(event) {
            const speechResult = event.results[0][0].transcript.toLowerCase();
            console.log("Heard:", speechResult);
            
            // ACTION COMMANDS
            if (speechResult.includes("capture") || speechResult.includes("start collect")) {
                if (typeof startAutoCapture === 'function') { startAutoCapture(); } else { window.location.href = "/collect"; }
            } else if (speechResult.includes("stop")) {
                if (typeof stopAutoCapture === 'function') { stopAutoCapture(); }
            } else if (speechResult.includes("execute train") || speechResult.includes("start train") || speechResult.includes("begin train")) {
                if (typeof startTraining === 'function') { startTraining(); } else { window.location.href = "/train_page"; }
            } else if (speechResult.includes("speak") || speechResult.includes("read") || speechResult.includes("say it") || speechResult.includes("listen")) {
                if (typeof speak === 'function') { speak(); } else { alert("The speak command is only available on the Recognize page."); }
            } else if (speechResult.includes("clear") || speechResult.includes("reset") || speechResult.includes("delete")) {
                if (typeof reset === 'function') { reset(); } else { alert("The clear buffer command is only available on the Recognize page."); }
            } 
            // NAVIGATION COMMANDS
            else if (speechResult.includes("collect") || speechResult.includes("data")) {
                window.location.href = "/collect";
            } else if (speechResult.includes("train") || speechResult.includes("model")) {
                window.location.href = "/train_page";
            } else if (speechResult.includes("recognize") || speechResult.includes("recognise") || speechResult.includes("recognition") || speechResult.includes("translate") || speechResult.includes("live")) {
                window.location.href = "/recognize";
            } else if (speechResult.includes("home") || speechResult.includes("main") || speechResult.includes("menu") || speechResult.includes("back")) {
                window.location.href = "/";
            } else {
                alert("Hmm, I didn't catch that command! I heard: '" + speechResult + "'.\\nPlease try an action like 'capture' or a page like 'home'.");
            }
            
            micBtn.innerHTML = originalText;
            micBtn.style.background = "rgba(255, 255, 255, 0.1)";
        };

        recognition.onspeechend = function() {
            recognition.stop();
            setTimeout(() => {
                micBtn.innerHTML = originalText;
                micBtn.style.background = "rgba(255, 255, 255, 0.1)";
            }, 500);
        };

        recognition.onerror = function(event) {
            console.error("Speech error", event.error);
            micBtn.innerHTML = originalText;
            micBtn.style.background = "rgba(255, 255, 255, 0.1)";
        };
    }
</script>
</body>



</html>
